services:

  # ── ngrok tunnel (expone la API al emulador Android y a Google OAuth) ────────
  ngrok:
    image: ngrok/ngrok:alpine
    container_name: situationist-ngrok
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN}"
    command: http api:8080 --url=${NGROK_DOMAIN} --log=stdout
    depends_on:
      - api
    ports:
      - "4040:4040"
    restart: unless-stopped

  # ── Backend API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: situationist-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=situationist;Username=situationist;Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      Jwt__PrivateKeyPem: "${JWT_PRIVATE_KEY_PEM}"
      Jwt__PublicKeyPem: "${JWT_PUBLIC_KEY_PEM}"
      OAuth__Google__ClientId: "${GOOGLE_CLIENT_ID}"
      OAuth__Google__ClientSecret: "${GOOGLE_CLIENT_SECRET}"
      OAuth__Google__RedirectUri: "${GOOGLE_REDIRECT_URI}"
      Ai__ApiKey: "${ANTHROPIC_API_KEY}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:17-3.5-alpine
    container_name: situationist-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: situationist
      POSTGRES_USER: situationist
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U situationist -d situationist"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: situationist-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
