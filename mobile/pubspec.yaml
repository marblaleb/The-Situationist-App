name: situationist
description: App de eventos situacionistas — intervención urbana / experiencia efímera
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navegación
  go_router: ^14.2.7

  # Red
  dio: ^5.7.0

  # Auth / Almacenamiento seguro
  flutter_secure_storage: ^9.2.2
  webview_flutter: ^4.8.0

  # Geolocalización
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Mapas
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # SignalR
  signalr_netcore: ^1.3.5

  # Tipografías
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  dart_geohash: ^2.1.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
