name: situationist
description: App de eventos situacionistas — intervención urbana / experiencia efímera
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Navegación
  go_router: ^17.2.1

  # Red
  dio: ^5.7.0

  # Auth / Almacenamiento seguro
  flutter_secure_storage: ^10.0.0
  webview_flutter: ^4.8.0

  # Geolocalización
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # Mapas
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # SignalR
  signalr_netcore: ^1.3.5

  # Tipografías
  google_fonts: ^8.0.2

  # Firebase
  firebase_core: ^4.7.0

  # Utils
  intl: ^0.20.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  dart_geohash: ^2.1.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.12
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
